name: Release Debug APK

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare release assets
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/debug/app-debug.apk "release-assets/bingwa-companion-${TAG_NAME}-debug.apk"
          sha256sum "release-assets/bingwa-companion-${TAG_NAME}-debug.apk" > "release-assets/bingwa-companion-${TAG_NAME}-debug.apk.sha256"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.apk
            release-assets/*.sha256
